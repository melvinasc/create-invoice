<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Free Invoice Generator</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="logo"><div class="logo-icon">📄</div> InvoiceFree</div>

    <div class="section-label">Logo</div>
    <div id="logo-control"></div>

    <div class="section-label">Template</div>

    <div class="tpl-group-label">✦ Business</div>
    <div class="template-grid">
      <button class="tpl-btn active" onclick="setTemplate('classic',this)">
        <div class="tpl-swatch" style="background:#1a1a2e"></div>Classic
      </button>
      <button class="tpl-btn" onclick="setTemplate('modern',this)">
        <div class="tpl-swatch" style="background:linear-gradient(135deg,#1a1a2e 50%,#4f46e5 50%)"></div>Modern
      </button>
      <button class="tpl-btn" onclick="setTemplate('minimal',this)">
        <div class="tpl-swatch" style="background:#fff;border:1px solid #ddd"></div>Minimal
      </button>
      <button class="tpl-btn" onclick="setTemplate('bold',this)">
        <div class="tpl-swatch" style="background:#4f46e5"></div>Bold
      </button>
      <button class="tpl-btn" onclick="setTemplate('corp',this)">
        <div class="tpl-swatch" style="background:linear-gradient(to bottom,#10b981 20%,#fff 20%)"></div>Corporate
      </button>
      <button class="tpl-btn" onclick="setTemplate('ocean',this)">
        <div class="tpl-swatch" style="background:linear-gradient(120deg,#0c4a6e,#0284c7)"></div>🌊 Ocean
      </button>
    </div>

    <div class="tpl-group-label" style="margin-top:14px">✦ Online / Creative</div>
    <div class="template-grid">
      <button class="tpl-btn" onclick="setTemplate('blossom',this)">
        <div class="tpl-swatch" style="background:linear-gradient(135deg,#fce4f3,#ffd6e7,#ffecd2)"></div>🌸 Blossom
      </button>
      <button class="tpl-btn" onclick="setTemplate('neon',this)">
        <div class="tpl-swatch" style="background:#0d0d1a;border:1px solid #00fff7"></div>⚡ Neon
      </button>
      <button class="tpl-btn" onclick="setTemplate('sun',this)">
        <div class="tpl-swatch" style="background:linear-gradient(135deg,#fbbf24,#fffbeb)"></div>☀️ Sunshine
      </button>
      <button class="tpl-btn" onclick="setTemplate('sage',this)">
        <div class="tpl-swatch" style="background:linear-gradient(135deg,#3d5a3e,#a8c5a0)"></div>🌿 Sage
      </button>
    </div>

    <div class="section-label">From</div>
    <div class="field"><label>Business / Your Name</label><input id="from-name" value="Acme Studio" oninput="render()"/></div>
    <div class="field"><label>Address / Details</label><textarea id="from-detail" oninput="render()">123 Main Street
Sydney NSW 2000
hello@acme.studio</textarea></div>

    <div class="section-label">To</div>
    <div class="field"><label>Client Name</label><input id="to-name" value="Client Corp Ltd" oninput="render()"/></div>
    <div class="field"><label>Address / Details</label><textarea id="to-detail" oninput="render()">456 King St
Melbourne VIC 3000
accounts@client.com</textarea></div>

    <div class="section-label">Invoice Details</div>
    <div class="two-col">
      <div class="field"><label>Invoice #</label><input id="inv-num" value="INV-0001" oninput="render()"/></div>
      <div class="field"><label>Date</label><input id="inv-date" type="date" oninput="render()"/></div>
    </div>
    <div class="two-col">
      <div class="field"><label>Due Date</label><input id="due-date" type="date" oninput="render()"/></div>
      <div class="field"><label>Currency</label>
        <select id="currency" onchange="render()">
          <option value="$">USD $</option>
          <option value="Rp">IDR Rp</option>
          <option value="A$">AUD A$</option>
          <option value="£">GBP £</option>
          <option value="€">EUR €</option>
          <option value="¥">JPY ¥</option>
          <option value="S$">SGD S$</option>
          <option value="RM">MYR RM</option>
          <option value="₹">INR ₹</option>
        </select>
      </div>
    </div>
    <div class="two-col">
      <div class="field"><label>Tax %</label><input id="tax-rate" type="number" value="10" min="0" max="100" oninput="render()"/></div>
      <div class="field"><label>Discount %</label><input id="disc-rate" type="number" value="0" min="0" max="100" oninput="render()"/></div>
    </div>

    <div class="section-label">Line Items</div>
    <div class="items-list" id="items-list"></div>
    <button class="add-item-btn" onclick="addItem()">+ Add Item</button>

    <div class="section-label">Notes</div>
    <div class="field"><textarea id="notes" oninput="render()" placeholder="Payment terms, bank details, thank-you message…">Payment due within 30 days.
Bank transfer preferred.
BSB: 000-000  Account: 12345678</textarea></div>

    <div class="actions">
      <button class="btn btn-primary" onclick="window.print()">🖨 Print / Save PDF</button>
      <button class="btn btn-outline" onclick="copyLink()">🔗 Copy Share Link</button>
    </div>
  </aside>

  <!-- ── PREVIEW ── -->
  <main class="preview-pane">
    <div class="preview-wrap">
      <div class="preview-header"><h2>Live Preview</h2></div>
      <div id="invoice-canvas"></div>
    </div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
